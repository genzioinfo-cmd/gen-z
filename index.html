<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GEN-Z — Çok Yakında</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0a0a0f;color:#f0eeff;font-family:'DM Sans',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.5;}
.blob{position:fixed;border-radius:50%;filter:blur(120px);opacity:0.12;pointer-events:none;z-index:0;animation:float 8s ease-in-out infinite;}
.blob-1{width:600px;height:600px;background:#7B5CF0;top:-200px;left:-100px;animation-delay:0s;}
.blob-2{width:500px;height:500px;background:#F0C55C;bottom:-150px;right:-100px;animation-delay:-3s;}
.blob-3{width:400px;height:400px;background:#5CF0B4;top:40%;left:50%;transform:translate(-50%,-50%);animation-delay:-6s;}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(20px,-20px) scale(1.05);}66%{transform:translate(-15px,15px) scale(0.97);}}
.lines{position:fixed;inset:0;z-index:0;pointer-events:none;display:flex;justify-content:space-between;padding:0 8%;}
.line{width:1px;background:linear-gradient(180deg,transparent 0%,rgba(123,92,240,.08) 30%,rgba(123,92,240,.08) 70%,transparent 100%);}
.wrap{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;pointer-events:none;}
.beta-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(123,92,240,.15);border:1px solid rgba(123,92,240,.35);border-radius:999px;padding:6px 18px;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#a78bfa;margin-bottom:2rem;animation:fadeUp .8s ease both;}
.beta-dot{width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
.logo{font-family:'Syne',sans-serif;font-size:clamp(3.5rem,12vw,8rem);font-weight:800;letter-spacing:-3px;background:linear-gradient(135deg,#fff 0%,#c4b5fd 50%,#F0C55C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:1.2rem;animation:fadeUp .8s .1s ease both;}
.tagline{font-family:'Syne',sans-serif;font-size:clamp(1.1rem,3vw,1.8rem);font-weight:400;color:rgba(240,238,255,.55);letter-spacing:-.3px;margin-bottom:2.5rem;animation:fadeUp .8s .2s ease both;}
.tagline em{font-style:normal;color:#5CF0B4;}
.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(123,92,240,.5),transparent);margin:0 auto 2.5rem;animation:fadeUp .8s .3s ease both;}
.coming{font-size:clamp(.75rem,2vw,.9rem);letter-spacing:.35em;text-transform:uppercase;color:rgba(240,238,255,.3);margin-bottom:3rem;animation:fadeUp .8s .35s ease both;}
.dots{display:flex;gap:10px;justify-content:center;margin-bottom:3.5rem;animation:fadeUp .8s .4s ease both;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(123,92,240,.4);animation:blink 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{background:rgba(123,92,240,.4);transform:scale(1);}50%{background:#7B5CF0;transform:scale(1.4);}}
.hint{font-size:.8rem;color:rgba(240,238,255,.2);letter-spacing:.05em;animation:fadeUp .8s .5s ease both;}
.hint span{color:rgba(240,197,92,.5);}
.footer{position:fixed;bottom:2rem;left:0;right:0;text-align:center;font-size:.7rem;letter-spacing:.15em;color:rgba(240,238,255,.12);text-transform:uppercase;z-index:1;pointer-events:none;animation:fadeUp .8s .6s ease both;}
.blocker{position:fixed;inset:0;z-index:9999;cursor:default;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="blocker" oncontextmenu="return false"></div>
<div class="lines"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="wrap">
  <div class="beta-badge"><div class="beta-dot"></div>Beta Süreci</div>
  <div class="logo">GEN-Z</div>
  <div class="tagline">Türkiye'nin yeni nesil platformu <em>geliyor.</em></div>
  <div class="divider"></div>
  <div class="coming">Çok Yakında</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="hint">Mağaza · Ustam · <span>Genç-Z</span></div>
</div>
<div class="footer">© 2025 GEN-Z · Tüm hakları saklıdır</div>
<script>
  document.addEventListener('click',e=>e.preventDefault(),true);
  document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(r => console.log("[GEN-Z] SW kayıtlı:", r.scope))
      .catch(e => console.warn("[GEN-Z] SW hatası:", e));
  });
}
</script>
</body>
</html>
