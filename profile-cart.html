<div class="profile-section-title">🛒 Sepetim</div>
<div id="cartList"></div>
<div class="cart-summary" id="cartSummary" style="display:none">
  <div class="cart-summary-row"><span>Ara toplam</span><span id="cartSubtotal">₺0</span></div>
  <div class="cart-summary-row"><span>Kargo</span><span style="color:var(--accent3)">Ücretsiz</span></div>
  <div class="cart-summary-row total"><span>Toplam</span><span id="cartTotal">₺0</span></div>
  <button class="btn-checkout" onclick="window.location.href='siparis.html'">Ödemeye Geç →</button>
</div>

<script>
(function() {
  const KEY = 'genz-sepet';

  function load() {
    try {
      const r = localStorage.getItem(KEY);
      if (!r) return [];
      const p = JSON.parse(r);
      return Array.isArray(p) ? p.map(i => ({...i, id: String(i.id), price: Number(i.price)||0, qty: Math.max(1, parseInt(i.qty)||1)})) : [];
    } catch { return []; }
  }

  // Firebase'e sepeti kaydet (async, fire-and-forget)
  async function syncToFirebase(items) {
    try {
      const uid = window._genzAuth?.auth?.currentUser?.uid
        || JSON.parse(localStorage.getItem('genz-user') || 'null')?.uid;
      if (!uid) return; // Giriş yapılmamış
      const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const { getFirestore, doc, setDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const app = getApps().length ? getApps()[0] : initializeApp({
        apiKey: 'AIzaSyASkzJZdiW-Yj5HhxRub0UVtKPkERjCAVQ',
        authDomain: 'gen-z-io.firebaseapp.com', projectId: 'gen-z-io',
        storageBucket: 'gen-z-io.firebasestorage.app',
        messagingSenderId: '97338868944', appId: '1:97338868944:web:d7b429e416d8c505b14ad5'
      });
      const db = getFirestore(app);
      await setDoc(doc(db, 'sepetler', uid), {
        uid, items,
        guncellendi: serverTimestamp()
      });
    } catch(e) {
      console.warn('Sepet Firebase sync hatası:', e);
    }
  }

  // Firebase'den sepeti yükle (sayfa açılışında)
  async function loadFromFirebase() {
    try {
      const uid = window._genzAuth?.auth?.currentUser?.uid
        || JSON.parse(localStorage.getItem('genz-user') || 'null')?.uid;
      if (!uid) return;
      const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const app = getApps().length ? getApps()[0] : initializeApp({
        apiKey: 'AIzaSyASkzJZdiW-Yj5HhxRub0UVtKPkERjCAVQ',
        authDomain: 'gen-z-io.firebaseapp.com', projectId: 'gen-z-io',
        storageBucket: 'gen-z-io.firebasestorage.app',
        messagingSenderId: '97338868944', appId: '1:97338868944:web:d7b429e416d8c505b14ad5'
      });
      const db = getFirestore(app);
      const snap = await getDoc(doc(db, 'sepetler', uid));
      if (snap.exists()) {
        const fbItems = snap.data().items || [];
        const localItems = load();
        // Merge: Firebase ve localStorage'ı birleştir, aynı ID'yi topla
        const merged = [...fbItems];
        localItems.forEach(li => {
          const existing = merged.find(m => m.id === li.id);
          if (!existing) merged.push(li);
        });
        if (merged.length > 0) {
          localStorage.setItem(KEY, JSON.stringify(merged));
          render(); // Güncellenen sepeti göster
        }
      }
    } catch(e) {
      console.warn('Sepet Firebase yükleme hatası:', e);
    }
  }

  function save(items) {
    try {
      localStorage.setItem(KEY, JSON.stringify(items));
      // profil badge'ini güncelle
      const badge = document.getElementById('cart-badge');
      if (badge) badge.textContent = items.reduce((t,i) => t + (i.qty||1), 0) || '';
      // Firebase'e de yaz (async)
      syncToFirebase(items);
    } catch {}
  }

  function updateTotal() {
    const items = load();
    const total = items.reduce((t, i) => t + i.price * (i.qty||1), 0);
    const sub = document.getElementById('cartSubtotal');
    const tot = document.getElementById('cartTotal');
    if (sub) sub.textContent = '₺' + total.toLocaleString('tr-TR');
    if (tot) tot.textContent = '₺' + total.toLocaleString('tr-TR');
  }

  window._cartChangeQty = function(idx, delta) {
    const items = load();
    if (!items[idx]) return;
    items[idx].qty = Math.max(1, (items[idx].qty || 1) + delta);
    save(items);
    document.getElementById('cqty-' + idx).textContent = items[idx].qty;
    document.getElementById('cprice-' + idx).textContent = '₺' + (items[idx].price * items[idx].qty).toLocaleString('tr-TR');
    updateTotal();
  };

  window._cartRemove = function(idx) {
    const items = load();
    const el = document.getElementById('ci-' + idx);
    if (el) { el.style.transition = 'all 0.22s'; el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; }
    setTimeout(() => {
      items.splice(idx, 1);
      save(items);
      render();
      if (typeof showToast === 'function') showToast('Ürün sepetten çıkarıldı 🗑');
    }, 220);
  };

  function render() {
    const items = load();
    const list = document.getElementById('cartList');
    const summary = document.getElementById('cartSummary');

    // badge
    const badge = document.getElementById('cart-badge');
    const totalQty = items.reduce((t,i) => t + (i.qty||1), 0);
    if (badge) badge.textContent = totalQty || '';

    if (items.length === 0) {
      list.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">Sepetiniz boş.</div></div>';
      summary.style.display = 'none';
      return;
    }

    list.innerHTML = items.map((item, idx) => `
      <div class="cart-item" id="ci-${idx}">
        <div class="cart-item-icon">${item.emoji || '📦'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-seller">${item.src || ''}${item.beden ? ' · ' + item.beden : ''}</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="_cartChangeQty(${idx}, -1)">−</button>
          <span class="qty-val" id="cqty-${idx}">${item.qty || 1}</span>
          <button class="qty-btn" onclick="_cartChangeQty(${idx}, 1)">+</button>
        </div>
        <span class="cart-item-price" id="cprice-${idx}">₺${(item.price * (item.qty||1)).toLocaleString('tr-TR')}</span>
        <button class="cart-item-del" onclick="_cartRemove(${idx})" title="Kaldır">✕</button>
      </div>`).join('');

    summary.style.display = '';
    updateTotal();
  }

  render();
  // Firebase'den sepeti çek (giriş yapılmışsa)
  loadFromFirebase();
})();
</script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="firebase-sync.js"></script>
<script src="tema-loader.js"></script>
<script src="cookie-consent.js"></script>
