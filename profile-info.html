<script src="tema-loader.js"></script>
<script src="cookie-consent.js"></script>
<script>
// Admin/Mod panel linklerini rol kontrolüyle göster
(function _panelLinkKontrol() {
  function goster() {
    const ku = window._genzKullanici;
    if (!ku) return;
    const rol = ku.rol || '';
    const roller = ku.roller || [];
    const isAdmin = rol === 'admin' || roller.includes('admin');
    const isMod   = rol === 'mod'   || roller.includes('mod');
    if (isAdmin || isMod) {
      document.getElementById('gizli-panel-links').style.display = 'flex';
      document.getElementById('gizli-panel-links').style.flexDirection = 'column';
    }
    if (isAdmin) {
      const el = document.getElementById('link-adminpanel');
      el.style.display = 'flex';
    }
    if (isMod || isAdmin) {
      const el = document.getElementById('link-modpanel');
      el.style.display = 'flex';
    }
  }
  // firebase-sync.js yüklenince tetiklenir
  window.addEventListener('genzSyncYuklendi', goster);
  // Zaten yüklüyse hemen kontrol
  if (window._genzKullanici) goster();
})();
</script>
