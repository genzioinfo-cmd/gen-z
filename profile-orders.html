<div class="profile-section-title">📦 Siparişlerim</div>
<div id="ordersList"></div>

<!-- İADE MODAL -->
<div id="iadeModal" onclick="iadeModalKapat(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div style="background:var(--bg2,#13131a);border:1px solid var(--border,#2e2e3f);border-radius:16px;width:calc(100% - 32px);max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.7);">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border,#2e2e3f);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2,#13131a);z-index:1;">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text,#f0eeff);">🔄 İade Talebi</div>
        <div style="font-size:11px;color:var(--text3,#5a5770);">6502 Sayılı Kanun & Mesafeli Sözleşmeler Yönetmeliği</div>
      </div>
      <button onclick="iadeModalKapat()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px 8px;">✕</button>
    </div>
    <div style="padding:1.2rem 1.4rem;" id="iadeModalIcerik">
      <div style="text-align:center;color:var(--text3);padding:2rem;">Yükleniyor…</div>
    </div>
  </div>
</div>

<style>
.iade-btn {
  padding: 6px 14px;
  background: rgba(92,240,180,.08);
  border: 1px solid rgba(92,240,180,.25);
  border-radius: var(--radius-sm, 8px);
  color: var(--accent3, #5CF0B4);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.iade-btn:hover { background: rgba(92,240,180,.16); }
.iade-btn.suresi-doldu {
  opacity: .4;
  cursor: not-allowed;
  color: var(--text3);
  border-color: var(--border);
  background: transparent;
}
.iade-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
}
.iade-badge.bekliyor { background:rgba(240,197,92,.12);color:var(--accent2,#F0C55C);border:1px solid rgba(240,197,92,.25); }
.iade-badge.onaylandi { background:rgba(92,240,180,.12);color:var(--accent3,#5CF0B4);border:1px solid rgba(92,240,180,.25); }
.iade-badge.reddedildi { background:rgba(255,80,80,.1);color:#ff6b6b;border:1px solid rgba(255,80,80,.2); }
</style>

<script type="module">
import { iadeModalAc, iadeHakkiHesapla, iadeKuraliBul } from './iade.js';
import {
  getFirestore, collection, query, where, getDocs, orderBy
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

let db;
try { db = getFirestore(getApp()); } catch(e) { db = getFirestore(); }

const DURUM_MAP = {
  hazirlaniyor : { label: 'Hazırlanıyor', cls: 'pending' },
  kargoda      : { label: 'Kargoda',      cls: 'pending' },
  kargo        : { label: 'Kargoda',      cls: 'pending' },
  teslim       : { label: 'Teslim Edildi', cls: 'delivered' },
  tamamlandi   : { label: 'Teslim Edildi', cls: 'delivered' },
  iptal        : { label: 'İptal',         cls: 'cancelled' },
};

async function kullaniciyiBul() {
  return new Promise(resolve => {
    const iv = setInterval(() => {
      const uid = window._genzAuth?.auth?.currentUser?.uid
        || JSON.parse(localStorage.getItem('genz-user') || 'null')?.uid;
      if (uid) { clearInterval(iv); resolve(uid); }
    }, 150);
    setTimeout(() => { clearInterval(iv); resolve(null); }, 4000);
  });
}

async function render() {
  const container = document.getElementById('ordersList');
  if (!container) return;

  const uid = await kullaniciyiBul();

  // Önce localStorage'dan dene
  let siparisler = [];
  try { siparisler = JSON.parse(localStorage.getItem('genz-siparisler') || '[]'); } catch {}

  // Firestore'dan da çek
  if (uid) {
    try {
      const snap = await getDocs(query(
        collection(db, 'magaza_siparisler'),
        where('musteriUid', '==', uid),
        orderBy('ts', 'desc')
      ));
      if (!snap.empty) {
        siparisler = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
    } catch(e) {}

    // İade taleplerini de çek
    let iadeler = [];
    try {
      const iSnap = await getDocs(query(
        collection(db, 'iade_talepleri'),
        where('musteriUid', '==', uid)
      ));
      iadeler = iSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {}

    // Sipariş kartlarını render et
    if (!siparisler.length) {
      container.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:14px;">
        Henüz siparişin yok.<br>
        <small style="font-size:12px;margin-top:6px;display:block;">Verdiğin siparişler burada görünecek.</small>
      </div>`;
      return;
    }

    container.innerHTML = siparisler.map(s => {
      const d = DURUM_MAP[s.durum] || { label: s.durum || 'İşlemde', cls: 'pending' };
      const ilkUrun = (s.urunler || [])[0];
      const urunAdi = s.urunAd || ilkUrun?.name || 'Sipariş';
      const emoji   = ilkUrun?.emoji || '📦';
      const extra   = s.urunler && s.urunler.length > 1 ? ` +${s.urunler.length - 1} ürün` : '';
      const kat     = s.kategori || ilkUrun?.kategori || '';

      // İade durumu
      const mevcutIade = iadeler.find(i => i.siparisId === s.id);
      const teslimEdildi = ['teslim','tamamlandi'].includes(s.durum);

      let iadeBtnHtml = '';
      if (mevcutIade) {
        const badgeCls = mevcutIade.durum === 'onaylandi' ? 'onaylandi' : mevcutIade.durum === 'reddedildi' ? 'reddedildi' : 'bekliyor';
        const badgeTxt = mevcutIade.durum === 'onaylandi' ? '✅ İade Onaylandı' : mevcutIade.durum === 'reddedildi' ? '❌ İade Reddedildi' : '⏳ İade Bekliyor';
        iadeBtnHtml = `<span class="iade-badge ${badgeCls}">${badgeTxt}</span>`;
      } else if (teslimEdildi) {
        const hesap = iadeHakkiHesapla(s.teslimTarihi || s.ts, kat);
        if (hesap.hakVar) {
          iadeBtnHtml = `<button class="iade-btn" onclick='iadeAc(${JSON.stringify({...s, id: s.id}).replace(/'/g,"\\'")})'
            title="${hesap.kalanGun} gün iade hakkınız var">
            🔄 İade Talebi (${hesap.kalanGun} gün)
          </button>`;
        } else if (hesap.istisna) {
          iadeBtnHtml = `<span class="iade-badge reddedildi" title="${hesap.aciklama}">🚫 İade Edilemez</span>`;
        } else {
          iadeBtnHtml = `<button class="iade-btn suresi-doldu" disabled title="İade süresi doldu">⏰ Süre Doldu</button>`;
        }
      }

      return `<div class="order-card" style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 16px;">
        <div class="order-icon">${emoji}</div>
        <div class="order-info" style="flex:1;min-width:0;">
          <div class="order-name">${urunAdi}${extra}</div>
          <div class="order-date">${s.tarih || (s.ts?.toDate ? s.ts.toDate().toLocaleDateString('tr-TR') : '')} · ${s.kod || ''}</div>
        </div>
        <span class="order-status ${d.cls}">${d.label}</span>
        <span class="order-price">₺${(s.toplam || 0).toLocaleString('tr-TR')}</span>
        ${iadeBtnHtml}
      </div>`;
    }).join('');

  } else {
    // Giriş yapılmamış
    container.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:14px;">
      Siparişlerini görmek için giriş yapmalısın.
    </div>`;
  }
}

window.iadeAc = function(siparisJson) {
  const s = typeof siparisJson === 'string' ? JSON.parse(siparisJson) : siparisJson;
  iadeModalAc(s);
};

render();
window.addEventListener('genzSyncYuklendi', render);
</script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="firebase-sync.js"></script>
