<div class="profile-section-title">⭐ Değerlendirmelerim</div>
<div id="reviewsList">
  <div class="review-card" id="review1">
    <div class="review-header">
      <span class="review-product-icon">🧴</span>
      <span class="review-product-name">Doğal Argan Yağı Şampuanı</span>
      <span class="review-stars" id="reviewStars1">★★★★★</span>
      <span class="review-date">15 Mart 2025</span>
    </div>
    <div class="review-text" id="reviewText1">Harika ürün, saçlarım çok daha sağlıklı görünüyor. Kesinlikle tavsiye ederim!</div>
    <div class="review-actions">
      <button class="review-btn review-btn-edit" onclick="openReviewModal('review1', 5, document.getElementById('reviewText1').textContent)">✏️ Düzenle</button>
      <button class="review-btn review-btn-del" onclick="deleteReview('review1')">🗑 Sil</button>
    </div>
  </div>
  <div class="review-card" id="review2">
    <div class="review-header">
      <span class="review-product-icon">🕯️</span>
      <span class="review-product-name">El Yapımı Soya Mum Seti</span>
      <span class="review-stars" id="reviewStars2">★★★★☆</span>
      <span class="review-date">22 Mart 2025</span>
    </div>
    <div class="review-text" id="reviewText2">Kokusu muhteşem, ambalaj çok şıktı. Teslimat biraz gecikti ama ürün mükemmel.</div>
    <div class="review-actions">
      <button class="review-btn review-btn-edit" onclick="openReviewModal('review2', 4, document.getElementById('reviewText2').textContent)">✏️ Düzenle</button>
      <button class="review-btn review-btn-del" onclick="deleteReview('review2')">🗑 Sil</button>
    </div>
  </div>
</div>
