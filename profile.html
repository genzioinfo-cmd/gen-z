<!DOCTYPE html>
<html lang="tr" data-theme="dark" data-lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="description" content="GEN-Z Profilim — Hesap bilgilerin, siparişlerin, favorilerin ve daha fazlası."/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GEN-Z · Profilim</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent: #7B5CF0;
  --accent2: #F0C55C;
  --accent3: #5CF0B4;
  --bg: #0a0a0f;
  --bg2: #13131a;
  --bg3: #1c1c28;
  --surface: #22222f;
  --border: #2e2e3f;
  --text: #f0eeff;
  --text2: #9b97b8;
  --text3: #5a5770;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(123,92,240,0.15);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
[data-theme="light"] {
  --bg: #f5f4ff; --bg2: #eeedf8; --bg3: #e4e3f2;
  --surface: #ffffff; --border: #d0cee8; --text: #1a1830;
  --text2: #5a5580; --text3: #9894b8;
  --shadow: 0 8px 32px rgba(123,92,240,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
body.theme-transitioning {
  transition: background-color 0.3s ease, color 0.3s ease;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
  will-change: auto; transform: translateZ(0); contain: strict;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 64px;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px;
}
[data-theme="light"] nav { background: rgba(245,244,255,0.85); }
.nav-logo {
  font-family: var(--font-display); font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px; cursor: pointer; flex-shrink: 0;
  text-decoration: none;
}
.nav-back-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none;
  color: var(--text2); font-family: var(--font-body);
  font-size: 14px; font-weight: 500; cursor: pointer;
  padding: 6px 12px; border-radius: var(--radius-sm);
  transition: color 0.2s, background 0.2s; text-decoration: none;
}
.nav-back-btn:hover { color: var(--text); background: var(--surface); }
.nav-right {
  display: flex; align-items: center; gap: 10px; margin-left: auto;
}
.btn-icon {
  width: 36px; height: 36px;
  border: 1px solid var(--border); background: var(--surface);
  border-radius: var(--radius-sm); cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: color 0.2s, border-color 0.2s;
}
.btn-icon:hover { color: var(--text); border-color: var(--accent); }

/* ── PAGE WRAPPER ── */
.page-wrapper {
  padding-top: 64px; min-height: 100vh;
  position: relative; z-index: 1;
}
.page-inner {
  max-width: 900px; margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ── PROFILE HEADER ── */
.profile-header {
  display: flex; align-items: flex-end; gap: 28px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px; flex-wrap: wrap;
}
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar-circle {
  width: 96px; height: 96px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 36px; font-weight: 800; color: #fff;
  overflow: hidden; border: 3px solid var(--border);
  box-shadow: 0 0 0 4px var(--bg), 0 0 0 5px var(--border);
}
.avatar-upload-btn {
  position: absolute; bottom: 2px; right: 2px;
  width: 28px; height: 28px; background: var(--accent);
  border: 2px solid var(--bg); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 12px; transition: transform 0.2s, background 0.2s; color: #fff;
}
.avatar-upload-btn:hover { background: #6a4de0; transform: scale(1.1); }
#avatarInput { display: none; }
.profile-meta { flex: 1; }
.profile-handle {
  font-family: var(--font-display); font-size: 26px; font-weight: 800;
  letter-spacing: -0.5px; margin-bottom: 4px;
}
.profile-email-display { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.profile-stats-row { display: flex; gap: 24px; }
.profile-stat { text-align: center; }
.profile-stat-num { font-family: var(--font-display); font-size: 18px; font-weight: 800; }
.profile-stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.profile-badge {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem;
  margin-top: .5rem;
}
.profile-badge-eski {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 999px;
  background: color-mix(in srgb, var(--accent) 15%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  color: var(--accent); font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; margin-top: 10px;
}

/* ── LAYOUT ── */
.profile-layout {
  display: grid; grid-template-columns: 200px 1fr; gap: 28px;
}
.profile-nav {
  display: flex; flex-direction: column; gap: 4px;
  position: sticky; top: 84px; height: fit-content;
}
.profile-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; font-weight: 500;
  color: var(--text2); transition: color 0.2s, background 0.2s, border-color 0.2s;
  border: 1px solid transparent; background: none;
  width: 100%; text-align: left; font-family: var(--font-body);
}
.profile-nav-item:hover { color: var(--text); background: var(--surface); }
.profile-nav-item.active {
  color: var(--accent);
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  border-color: color-mix(in srgb, var(--accent) 20%, transparent);
}
.profile-nav-item .nav-icon { font-size: 16px; }
.profile-nav-item .nav-badge {
  margin-left: auto; background: var(--accent);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 999px; min-width: 18px; text-align: center;
}
.profile-tab { display: none; }
.profile-tab.active { display: block; }
.profile-section-title {
  font-family: var(--font-display); font-size: 18px; font-weight: 800;
  letter-spacing: -0.3px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}

/* ── ORDERS ── */
.order-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 16px;
  transition: color 0.2s, background 0.2s, border-color 0.2s;
}
.order-card:hover { border-color: var(--accent); }
.order-icon { font-size: 28px; flex-shrink: 0; }
.order-info { flex: 1; }
.order-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.order-date { font-size: 12px; color: var(--text3); }
.order-status {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 999px; white-space: nowrap;
}
.order-status.delivered {
  background: color-mix(in srgb, #5CF0B4 15%, transparent);
  color: #5CF0B4; border: 1px solid color-mix(in srgb, #5CF0B4 30%, transparent);
}
.order-status.pending {
  background: color-mix(in srgb, #F0C55C 15%, transparent);
  color: #F0C55C; border: 1px solid color-mix(in srgb, #F0C55C 30%, transparent);
}
.order-price { font-size: 15px; font-weight: 700; color: var(--accent); margin-left: 8px; white-space: nowrap; }

/* ── FAVORITES ── */
.fav-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px;
}
.fav-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; text-align: center;
  cursor: pointer; transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s; position: relative;
}
.fav-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
.fav-card-icon { font-size: 32px; margin-bottom: 10px; }
.fav-card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.fav-card-price { font-size: 12px; color: var(--accent); font-weight: 700; }
.fav-remove {
  position: absolute; top: 8px; right: 8px;
  width: 22px; height: 22px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 50%; cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); transition: color 0.2s, opacity 0.2s;
}
.fav-remove:hover { color: #ff5f5f; border-color: #ff5f5f; }

/* ── PERSONAL INFO ── */
.info-grid { display: grid; gap: 14px; }
.info-row {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; gap: 14px; transition: background 0.2s, border-color 0.2s;
}
.info-row-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.info-row-content { flex: 1; }
.info-row-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; }
.info-row-val { font-size: 14px; color: var(--text); font-weight: 500; }
.info-edit-btn {
  padding: 6px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: color 0.2s, background 0.2s; font-family: var(--font-body); white-space: nowrap;
}
.info-edit-btn:hover { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
.signout-row { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
.btn-signout {
  width: 100%; padding: 13px;
  background: color-mix(in srgb, #ff5f5f 10%, transparent);
  border: 1px solid color-mix(in srgb, #ff5f5f 30%, transparent);
  border-radius: var(--radius); font-family: var(--font-body);
  font-size: 14px; font-weight: 500; color: #ff8a8a; cursor: pointer; transition: color 0.2s, opacity 0.2s;
}
.btn-signout:hover { background: color-mix(in srgb, #ff5f5f 20%, transparent); border-color: #ff5f5f; color: #ff5f5f; }

/* ── EDIT MODAL ── */
.edit-modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.edit-modal-overlay.open { opacity: 1; pointer-events: all; }
.edit-modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px;
  width: calc(100% - 48px); max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transform: scale(0.96); transition: transform 0.25s;
}
.edit-modal-overlay.open .edit-modal { transform: scale(1); }
.edit-modal-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.edit-modal-input {
  width: 100%; padding: 11px 14px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font-body);
  font-size: 14px; color: var(--text); outline: none;
  transition: border-color 0.2s; margin-bottom: 16px;
}
.edit-modal-input:focus { border-color: var(--accent); }
.edit-modal-actions { display: flex; gap: 10px; }
.edit-modal-cancel {
  flex: 1; padding: 10px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font-body);
  font-size: 14px; color: var(--text2); cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.edit-modal-cancel:hover { border-color: var(--accent); color: var(--text); }
.edit-modal-save {
  flex: 1; padding: 10px; background: var(--accent); border: none;
  border-radius: var(--radius-sm); font-family: var(--font-body);
  font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; transition: background 0.2s;
}
.edit-modal-save:hover { background: #6a4de0; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; right: 24px; z-index: 999;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: var(--radius-sm);
  padding: 12px 18px; font-size: 13px; color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  transform: translateY(80px); opacity: 0; transition: transform 0.3s, opacity 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── ADDRESS ── */
.address-grid { display: grid; gap: 14px; }
.address-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: color 0.2s, background 0.2s; position: relative;
}
.address-card:hover { border-color: var(--accent); }
.address-card.default-addr { border-color: var(--accent3); }
.address-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.address-body { flex: 1; }
.address-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.address-default-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 8px; border-radius: 999px;
  background: color-mix(in srgb, var(--accent3) 15%, transparent);
  color: var(--accent3); border: 1px solid color-mix(in srgb, var(--accent3) 30%, transparent);
}
.address-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.address-actions { display: flex; gap: 6px; flex-shrink: 0; }
.addr-btn {
  padding: 5px 12px; font-size: 12px; font-weight: 500;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-body); transition: border-color 0.2s;
}
.addr-btn-edit {
  background: var(--surface); border: 1px solid var(--border); color: var(--text2);
}
.addr-btn-edit:hover { border-color: var(--accent); color: var(--accent); }
.addr-btn-del {
  background: color-mix(in srgb, #ff5f5f 8%, transparent);
  border: 1px solid color-mix(in srgb, #ff5f5f 20%, transparent);
  color: #ff8a8a;
}
.addr-btn-del:hover { border-color: #ff5f5f; color: #ff5f5f; }
.btn-add-addr {
  width: 100%; padding: 13px;
  background: transparent; border: 1px dashed var(--border);
  border-radius: var(--radius); font-family: var(--font-body);
  font-size: 14px; color: var(--text3); cursor: pointer; transition: color 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px;
}
.btn-add-addr:hover { border-color: var(--accent); color: var(--accent); }

/* ── NOTIFICATIONS ── */
.notif-section { margin-bottom: 28px; }
.notif-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
}
.notif-row {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 10px; transition: border-color 0.2s, background 0.2s;
}
.notif-row:hover { border-color: var(--border); }
.notif-icon { font-size: 20px; flex-shrink: 0; }
.notif-info { flex: 1; }
.notif-label { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.notif-desc { font-size: 12px; color: var(--text3); }
.toggle-wrap { position: relative; flex-shrink: 0; }
.toggle-input { display: none; }
.toggle-label {
  display: block; width: 44px; height: 24px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 999px; cursor: pointer; transition: background 0.3s; position: relative;
}
.toggle-label::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--text3); transition: background 0.3s, transform 0.3s;
}
.toggle-input:checked + .toggle-label { background: var(--accent); border-color: var(--accent); }
.toggle-input:checked + .toggle-label::after { left: 23px; background: #fff; }

/* ── REVIEWS ── */
.review-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  margin-bottom: 12px; transition: border-color 0.2s, background 0.2s;
}
.review-card:hover { border-color: var(--accent); }
.review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.review-product-icon { font-size: 24px; }
.review-product-name { font-size: 14px; font-weight: 600; flex: 1; }
.review-stars { color: var(--accent2); font-size: 14px; }
.review-date { font-size: 11px; color: var(--text3); }
.review-text { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }
.review-actions { display: flex; gap: 8px; }
.review-btn {
  padding: 5px 14px; font-size: 12px; font-weight: 500;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--font-body); transition: border-color 0.2s, background 0.2s;
}
.review-btn-edit {
  background: var(--surface); border: 1px solid var(--border); color: var(--text2);
}
.review-btn-edit:hover { border-color: var(--accent); color: var(--accent); }
.review-btn-del {
  background: color-mix(in srgb, #ff5f5f 8%, transparent);
  border: 1px solid color-mix(in srgb, #ff5f5f 20%, transparent); color: #ff8a8a;
}
.review-btn-del:hover { border-color: #ff5f5f; color: #ff5f5f; }

/* ── CART ── */
.cart-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 12px; transition: border-color 0.2s;
}
.cart-item:hover { border-color: var(--accent); }
.cart-item-icon { font-size: 32px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.cart-item-seller { font-size: 12px; color: var(--text3); }
.cart-item-qty {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.qty-btn {
  width: 28px; height: 28px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, background 0.2s; font-family: var(--font-body);
}
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-val { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; }
.cart-item-price { font-size: 15px; font-weight: 700; color: var(--accent); margin-left: 8px; white-space: nowrap; }
.cart-item-del {
  width: 28px; height: 28px; background: none;
  border: 1px solid transparent; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text3); font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: color 0.2s, border-color 0.2s;
}
.cart-item-del:hover { border-color: #ff5f5f; color: #ff5f5f; }
.cart-summary {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  margin-top: 8px;
}
.cart-summary-row {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--text2); margin-bottom: 10px;
}
.cart-summary-row.total {
  font-size: 16px; font-weight: 700; color: var(--text);
  padding-top: 12px; border-top: 1px solid var(--border); margin-bottom: 16px;
}
.cart-summary-row.total span:last-child { color: var(--accent); }
.btn-checkout {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius); font-family: var(--font-body);
  font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.2s;

.addr-save-btn {

}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {

/* ── 60FPS PERFORMANCE ── */
nav, .toast, .edit-modal-overlay, .edit-modal,

.review-modal-overlay, .review-modal-box {

/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {

<script>
/* ── SAFE STORAGE ── */
const _ls = {
  get(k, fb = null) { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch(e) { return fb; } },
  set(k, v)         { try { localStorage.setItem(k, v); } catch(e) {} },
  remove(k)         { try { localStorage.removeItem(k); } catch(e) {} },
  getJSON(k, fb)    { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch(e) { return fb; } },
};
/* ── STATE ── */
let currentTheme = _ls.get('genz-theme', 'dark');
let currentUser  = _ls.getJSON('genz-user', null);
let _editField   = null;

/* ── INIT ── */
document.documentElement.setAttribute('data-theme', currentTheme);
document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '🌙' : '☀️';

if (currentUser) {
  document.getElementById('profilePageHandle').textContent  = currentUser.username;
  document.getElementById('profilePageEmail').textContent   = currentUser.email;
  const infoUser = document.getElementById('info-username');
  const infoEmail = document.getElementById('info-email');
  if (infoUser) infoUser.textContent = currentUser.username;
  if (infoEmail) infoEmail.textContent = currentUser.email;
  document.getElementById('avatarInitial').textContent      = currentUser.username.replace('@','').charAt(0).toUpperCase();

  // localStorage'daki rol bilgisiyle hemen göster
  renderRolKisayollar(currentUser);

  // Firestore'dan güncel rol bilgisini çek ve güncelle
  (async () => {
    try {
      const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
      const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const cfg = { apiKey:"AIzaSyASkzJZdiW-Yj5HhxRub0UVtKPkERjCAVQ", authDomain:"gen-z-io.firebaseapp.com", projectId:"gen-z-io", storageBucket:"gen-z-io.firebasestorage.app", messagingSenderId:"97338868944", appId:"1:97338868944:web:d7b429e416d8c505b14ad5" };
      const app = getApps().length ? getApps()[0] : initializeApp(cfg);
      const db = getFirestore(app);
      const snap = await getDoc(doc(db, 'kullanicilar', currentUser.uid));
      if (snap.exists()) {
        const d = snap.data();
        // localStorage'ı güncelle
        const updated = { ...currentUser, rol: d.rol || 'uye', roller: d.roller || [], admin: d.admin || false, ustaOnay: d.ustaOnay || false, magazaOnay: d.magazaOnay || false, gencimDurum: d.gencimDurum || '' };
        _ls.set('genz-user', JSON.stringify(updated));
        currentUser = updated;
        // Kısayolları yeniden render et (güncel rol ile)
        const rzCont = document.getElementById('rol-kisayollar');
        if (rzCont) { rzCont.innerHTML = '<div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.6px; padding:4px 8px 6px; font-weight:600;">Profillerim</div>'; rzCont.style.display = 'none'; }
        renderRolKisayollar(updated);
      }
    } catch(e) { console.warn('Profil güncel veri hatası:', e); }
  })();
} else {
  /* Giriş yapılmamışsa ana sayfaya yönlendir */
  window.location.href = 'index.html?auth=signin';
}

/* Geri butonunun dili de slide animasyonu ile yapsın */
document.getElementById('backBtn').addEventListener('click', function(e) {
  e.preventDefault();
  document.body.style.transition = 'opacity 0.3s';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'index.html?auth=signin'; }, 300);
});

/* ── THEME ── */
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  _ls.set('genz-theme', currentTheme);
  document.body.classList.add('theme-transitioning');
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  showToast(currentTheme === 'dark' ? 'Koyu tema 🌙' : 'Açık tema ☀️');
  setTimeout(() => document.body.classList.remove('theme-transitioning'), 350);
}

/* ── ROL KISAYOLLARI ── */
function renderRolKisayollar(user) {
  const container = document.getElementById('rol-kisayollar');
  if (!container) return;
  const rol = (user.rol || '').toLowerCase();
  const roller_arr = Array.isArray(user.roller) ? user.roller.map(r => r.toLowerCase()) : [];
  const tumRoller = new Set([...roller_arr, ...(rol ? [rol] : [])]);
  const isAdmin = tumRoller.has('admin') || user.admin === true;

  // Rol kontrolü — Firestore'daki gerçek alanlarla eşleşiyor
  const hasMagaza = user.magazaOnay === true || tumRoller.has('magaza') || tumRoller.has('satici');
  const hasUsta   = user.ustaOnay   === true || tumRoller.has('usta')   || tumRoller.has('ustam');
  const hasGencz  = user.gencimDurum === 'onaylandi' || tumRoller.has('gencz');

  const uid = user.uid || user.id || '';
  let added = 0;

  // Modpanel linki — tüm roller için en önemli link
  if (hasMagaza || hasUsta || hasGencz || isAdmin) {
    const panel = document.createElement('a');
    panel.className = 'profile-nav-item';
    panel.href = 'modpanel.html';
    panel.style.cssText = 'text-decoration:none;display:flex;align-items:center;gap:8px;background:rgba(123,92,240,0.08);border-radius:6px;';
    panel.innerHTML = '<span>🎛️ Kontrol Paneli</span>';
    container.appendChild(panel);
    added++;
  }

  // Mağaza profil linki
  if (isAdmin || hasMagaza) {
    const btn = document.createElement('a');
    btn.className = 'profile-nav-item';
    btn.href = uid ? `magaza-satici.html?uid=${encodeURIComponent(uid)}` : 'magaza-satici.html';
    btn.style.cssText = 'text-decoration:none;display:flex;align-items:center;gap:8px;';
    btn.innerHTML = '<span>🏪 Mağazam</span>';
    container.appendChild(btn);
    added++;
  }

  // Usta profil linki
  if (isAdmin || hasUsta) {
    const btn = document.createElement('a');
    btn.className = 'profile-nav-item';
    btn.href = uid ? `ustam-profil.html?uid=${encodeURIComponent(uid)}` : 'ustam-profil.html';
    btn.style.cssText = 'text-decoration:none;display:flex;align-items:center;gap:8px;';
    btn.innerHTML = '<span>🔨 Usta Profilim</span>';
    container.appendChild(btn);
    added++;
  }

  // Genç-Z profil linki
  if (isAdmin || hasGencz) {
    const btn = document.createElement('a');
    btn.className = 'profile-nav-item';
    btn.href = uid ? `gen-z_satici.html?uid=${encodeURIComponent(uid)}` : 'gen-z_satici.html';
    btn.style.cssText = 'text-decoration:none;display:flex;align-items:center;gap:8px;';
    btn.innerHTML = '<span>⚡ Genç-Z Profilim</span>';
    container.appendChild(btn);
    added++;
  }

  if (added > 0) container.style.display = 'block';
}

/* ── TAB SWITCHING — dinamik yükleme ── */
const TAB_FILES = {
  orders:        'profile-orders.html',
  favorites:     'profile-favorites.html',
  cart:          'profile-cart.html',
  randevular:    'profile-randevular.html',
  projeler:      'profile-projeler.html',
  reviews:       'profile-reviews.html',
  addresses:     'profile-addresses.html',
  notifications: 'profile-notifications.html',
  info:          'profile-info.html',
};
let _currentTab = null;

async function loadTab(tab) {
  if (_currentTab === tab) return;
  _currentTab = tab;

  /* Sidebar aktif state */
  document.querySelectorAll('.profile-nav-item').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('pnav-' + tab);
  if (btn) btn.classList.add('active');

  /* İçerik alanını yükle */
  const content = document.getElementById('profile-content');
  content.style.opacity = '0';
  content.style.transform = 'translateY(8px)';
  content.style.transition = 'opacity 0.2s, transform 0.2s';

  try {
    const res = await fetch(TAB_FILES[tab]);
    if (!res.ok) throw new Error('Dosya bulunamadı: ' + TAB_FILES[tab]);
    const html = await res.text();
    content.innerHTML = html;

    /* İnjected script'leri çalıştır — innerHTML script'leri execute etmez */
    content.querySelectorAll('script').forEach(oldScript => {
      const newScript = document.createElement('script');
      // type="module" ise koru, değilse normal
      if (oldScript.type) newScript.type = oldScript.type;
      if (oldScript.src) {
        newScript.src = oldScript.src;
      } else {
        newScript.textContent = oldScript.textContent;
      }
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });

    /* info sekmesinde kullanıcı bilgilerini doldur */
    if (tab === 'info' && currentUser) {
      const el = document.getElementById('info-username');
      const el2 = document.getElementById('info-email');
      const el3 = document.getElementById('info-phone');
      const el4 = document.getElementById('info-city');
      const el5 = document.getElementById('info-role');
      if (el) el.textContent = currentUser.username || '';
      if (el2) el2.textContent = currentUser.email || '';
      if (el3 && currentUser.phone) el3.textContent = currentUser.phone;
      if (el4 && currentUser.city) el4.textContent = currentUser.city;
      if (el5 && currentUser.rol) el5.textContent = currentUser.rol;
    }

    /* notifications sekmesinde kayıtlı tercihleri uygula */
    if (tab === 'notifications') {
      restoreNotifPrefs();
    }

    /* Animasyon — double rAF: tarayıcıya önce opacity:0'ı paint ettir, sonra transition başlat */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        content.style.opacity = '1';
        content.style.transform = 'translateY(0)';
      });
    });
  } catch (err) {
    content.innerHTML = `<div style="color:var(--text3);padding:32px;text-align:center;">⚠️ Sekme yüklenemedi.<br><small>${err.message}</small></div>`;
    content.style.opacity = '1';
    content.style.transform = 'translateY(0)';
  }
}

/* ── AVATAR ── */
function handleAvatarUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const avatar = document.getElementById('profileAvatar');
    avatar.innerHTML = `<img src="${ev.target.result}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    showToast('Avatar güncellendi 🎉');
  };
  reader.readAsDataURL(file);
}

/* ── REMOVE FAV ── */
function removeFav(btn) {
  const card = btn.closest('.fav-card');
  card.style.transition = 'all 0.25s';
  card.style.transform = 'scale(0)'; card.style.opacity = '0';
  setTimeout(() => {
    card.remove();
    const count = document.querySelectorAll('.fav-card').length;
    document.getElementById('profileFavCount').textContent = count;
    document.getElementById('favs-badge').textContent = count;
  }, 250);
  showToast('Favorilerden çıkarıldı 💔');
}

/* ── EDIT FIELD ── */
const FIELD_LABELS = {
  username: 'Yeni kullanıcı adı', email: 'Yeni e-posta',
  password: 'Yeni şifre', role: 'Rol (magaza / ustam / gencz)',
  phone: 'Telefon numaranız', city: 'Şehriniz'
};
function editField(field) {
  _editField = field;
  document.getElementById('editModalTitle').textContent = FIELD_LABELS[field] || field;
  const input = document.getElementById('editModalInput');
  input.type = field === 'password' ? 'password' : 'text';
  input.value = '';
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => input.focus(), 100);
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); _editField = null; }
function saveEditModal() {
  const val = document.getElementById('editModalInput').value.trim();
  if (!val) { showToast('Boş bırakılamaz ⚠️'); return; }
  const field = _editField;
  if (field === 'username') {
    const clean = '@' + val.replace('@','');
    document.getElementById('profilePageHandle').textContent = clean;
    document.getElementById('info-username').textContent = clean;
    document.getElementById('avatarInitial').textContent = clean.replace('@','').charAt(0).toUpperCase();
    if (currentUser) { currentUser.username = clean; _ls.set('genz-user', JSON.stringify(currentUser)); }
    showToast('Kullanıcı adı güncellendi ✓');
  } else if (field === 'email') {
    document.getElementById('profilePageEmail').textContent = val;
    document.getElementById('info-email').textContent = val;
    if (currentUser) { currentUser.email = val; _ls.set('genz-user', JSON.stringify(currentUser)); }
    showToast('E-posta güncellendi ✓');
  } else if (field === 'password') {
    showToast('Şifre güncellendi ✓');
  } else if (field === 'role') {
    document.getElementById('info-role').textContent = val;
    document.getElementById('profileRoleBadge').textContent = val;
    showToast('Rol güncellendi ✓');
  } else if (field === 'phone') {
    document.getElementById('info-phone').textContent = val;
    if (currentUser) { currentUser.phone = val; _ls.set('genz-user', JSON.stringify(currentUser)); }
    showToast('Telefon güncellendi ✓');
  } else if (field === 'city') {
    document.getElementById('info-city').textContent = val;
    if (currentUser) { currentUser.city = val; _ls.set('genz-user', JSON.stringify(currentUser)); }
    showToast('Şehir güncellendi ✓');
  }
  closeEditModal();
}

/* ── CART ── */

/* ── REVIEWS ── */
let _activeReviewId = null;
let _reviewRating = 5;
function openReviewModal(id, rating, text) {
  _activeReviewId = id;
  _reviewRating = rating;
  document.getElementById('reviewModalText').value = text;
  updateReviewStarPicker(rating);
  document.getElementById('reviewModal').classList.add('open');
}
function closeReviewModal() { document.getElementById('reviewModal').classList.remove('open'); _activeReviewId = null; }
function updateReviewStarPicker(val) {
  document.querySelectorAll('.review-star-pick').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.val) <= val);
  });
}
function saveReview() {
  if (!_activeReviewId) return;
  const text = document.getElementById('reviewModalText').value.trim();
  if (!text) { showToast('Yorum boş bırakılamaz ⚠️'); return; }
  const num = _activeReviewId.replace('review', '');
  document.getElementById('reviewText' + num).textContent = text;
  document.getElementById('reviewStars' + num).textContent = '★'.repeat(_reviewRating) + '☆'.repeat(5 - _reviewRating);
  closeReviewModal();
  showToast('Değerlendirme güncellendi ✓');
}
function deleteReview(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.transition = 'all 0.25s';
  el.style.opacity = '0'; el.style.transform = 'scale(0.95)';
  setTimeout(() => {
    el.remove();
    document.getElementById('reviews-badge').textContent = document.querySelectorAll('.review-card').length;
  }, 250);
  showToast('Değerlendirme silindi 🗑');
}
document.querySelectorAll('.review-star-pick').forEach(star => {
  star.addEventListener('mouseover', () => updateReviewStarPicker(parseInt(star.dataset.val)));
  star.addEventListener('mouseout', () => updateReviewStarPicker(_reviewRating));
  star.addEventListener('click', () => { _reviewRating = parseInt(star.dataset.val); updateReviewStarPicker(_reviewRating); });
});

/* ── ADDRESSES ── */
let _activeAddrId = null;
let _addrCounter = 3;
function openAddrModal(id) {
  _activeAddrId = id;
  document.getElementById('addrModalTitle').textContent = id ? 'Adresi Düzenle' : 'Yeni Adres Ekle';
  ['addrTitle','addrLine','addrDistrict','addrCity','addrZip','addrPhone'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('addrModal').classList.add('open');
}
function closeAddrModal() { document.getElementById('addrModal').classList.remove('open'); _activeAddrId = null; }
function saveAddr() {
  const title = document.getElementById('addrTitle').value.trim();
  const line   = document.getElementById('addrLine').value.trim();
  const dist   = document.getElementById('addrDistrict').value.trim();
  const city   = document.getElementById('addrCity').value.trim();
  const zip    = document.getElementById('addrZip').value.trim();
  if (!title || !line || !city) { showToast('Başlık, adres ve şehir zorunlu ⚠️'); return; }
  const fullText = line + (dist ? '<br>' + dist : '') + ' / ' + city + (zip ? ', ' + zip : '');
  if (_activeAddrId) {
    const card = document.getElementById(_activeAddrId);
    if (card) {
      const defTag = card.querySelector('.address-default-tag') ? ' <span class="address-default-tag">Varsayılan</span>' : '';
      card.querySelector('.address-title').innerHTML = title + defTag;
      card.querySelector('.address-text').innerHTML = fullText;
    }
    showToast('Adres güncellendi ✓');
  } else {
    const newId = 'addr' + _addrCounter++;
    const card = document.createElement('div');
    card.className = 'address-card'; card.id = newId;
    card.innerHTML = `<div class="address-icon">📍</div>
      <div class="address-body">
        <div class="address-title">${title}</div>
        <div class="address-text">${fullText}</div>
      </div>
      <div class="address-actions">
        <button class="addr-btn addr-btn-edit" onclick="openAddrModal('${newId}')">Düzenle</button>
        <button class="addr-btn addr-btn-del" onclick="deleteAddr('${newId}')">Sil</button>
      </div>`;
    document.getElementById('addressGrid').appendChild(card);
    showToast('Yeni adres eklendi ✓');
  }
  closeAddrModal();
}
function deleteAddr(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.transition = 'all 0.25s';
  el.style.opacity = '0'; el.style.transform = 'scale(0.95)';
  setTimeout(() => el.remove(), 250);
  showToast('Adres silindi 🗑');
}
document.getElementById('addrModal').addEventListener('click', e => { if (e.target === document.getElementById('addrModal')) closeAddrModal(); });
document.getElementById('reviewModal').addEventListener('click', e => { if (e.target === document.getElementById('reviewModal')) closeReviewModal(); });

/* ── NOTIFICATIONS ── */
function saveNotif(el) {
  // Bildirim tercihlerini localStorage'a kaydet
  try {
    const KEY = 'genz-bildirimler';
    let prefs = JSON.parse(localStorage.getItem(KEY) || '{}');
    prefs[el.id] = el.checked;
    localStorage.setItem(KEY, JSON.stringify(prefs));
  } catch(e) {}
  showToast(el.checked ? 'Bildirim açıldı 🔔' : 'Bildirim kapatıldı 🔕');
}

function restoreNotifPrefs() {
  try {
    const KEY = 'genz-bildirimler';
    const prefs = JSON.parse(localStorage.getItem(KEY) || '{}');
    Object.entries(prefs).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.checked = val;
    });
  } catch(e) {}
}

/* ── SIGN OUT ── */
function doSignOut() {
  currentUser = null;
  _ls.remove('genz-user');
  showToast('Çıkış yapıldı 👋');
  setTimeout(() => {
    document.body.style.transition = 'opacity 0.3s';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = 'index.html?auth=signin'; }, 300);
  }, 800);
}

/* ── TOAST ── */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── EDIT MODAL OUTSIDE CLICK ── */
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEditModal();
});

/* ── İLK SEKME YÜKLEMESİ ── */
document.addEventListener('DOMContentLoaded', () => {
  // URL'den tab parametresi oku (sepet ikonu bağlantısı için)
  const _urlTab = new URLSearchParams(window.location.search).get('tab');
  loadTab(_urlTab && ['orders','favorites','cart','reviews','addresses','notifications','info','randevular'].includes(_urlTab) ? _urlTab : 'orders');

  /* ── SEPET BADGE INIT ── */
  (function() {
    try {
      const items = JSON.parse(localStorage.getItem('genz-sepet')) || [];
      const qty = items.reduce((t, i) => t + (i.qty || 1), 0);
      const badge = document.getElementById('cart-badge');
      if (badge) badge.textContent = qty || '';
    } catch {}
  })();

});
