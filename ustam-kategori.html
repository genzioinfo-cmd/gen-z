<style>

:root {
  --accent: #7B5CF0;
  --accent2: #F0C55C;
  --accent3: #5CF0B4;
  --bg: #0a0a0f;
  --bg2: #13131a;
  --bg3: #1c1c28;
  --surface: #22222f;
  --border: #2e2e3f;
  --text: #f0eeff;
  --text2: #9b97b8;
  --text3: #5a5770;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(123,92,240,0.15);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
[data-theme="light"] {
  --bg: #f5f4ff; --bg2: #eeedf8; --bg3: #e4e3f2;
  --surface: #ffffff; --border: #d0cee8; --text: #1a1830;
  --text2: #5a5580; --text3: #9894b8;
  --shadow: 0 8px 32px rgba(123,92,240,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
body.theme-transitioning { transition: background-color 0.3s ease, color 0.3s ease; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
  will-change: auto; transform: translateZ(0); contain: strict;
}

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 64px; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 0; }
[data-theme="light"] nav { background: rgba(245,244,255,0.85); }
.nav-logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; cursor: pointer; flex-shrink: 0; text-decoration: none; }
.nav-links { display: flex; align-items: center; gap: 2px; margin-left: 32px; flex: 1; list-style: none; }
.nav-links a { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text2); text-decoration: none; padding: 6px 12px; border-radius: var(--radius-sm); transition: color 0.2s, background 0.2s; white-space: nowrap; }
.nav-links a:hover { color: var(--text); background: var(--surface); }
.nav-links a.active { color: var(--accent2); }
.nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.btn-icon { width: 36px; height: 36px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: color 0.2s, border-color 0.2s; }
.btn-icon:hover { color: var(--text); border-color: var(--accent); }
.btn-signin { padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.2s; }
.btn-signin:hover { background: #6a4de0; transform: translateY(-1px); }
.hamburger { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px; width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: border-color 0.2s; }
.hamburger span { display: block; width: 16px; height: 2px; background: var(--text2); border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; z-index: 99; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px 20px; flex-direction: column; gap: 4px; backdrop-filter: blur(20px); }
.mobile-menu.open { display: flex; }
.mobile-menu a { font-size: 15px; font-weight: 500; color: var(--text2); text-decoration: none; padding: 10px 12px; border-radius: var(--radius-sm); transition: color 0.2s, background 0.2s; }
.mobile-menu a:hover { color: var(--text); background: var(--surface); }
.toast { position: fixed; bottom: 28px; right: 24px; z-index: 999; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent2); border-radius: var(--radius-sm); padding: 12px 18px; font-size: 13px; color: var(--text); box-shadow: 0 8px 24px rgba(0,0,0,0.3); transform: translateY(80px); opacity: 0; transition: transform 0.3s, opacity 0.3s; will-change: transform, opacity; }
.toast.show { transform: translateY(0); opacity: 1; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ── 60FPS PERFORMANCE ── */
nav, .modal-overlay-auth, .modal-box, .toast {
  will-change: transform, opacity;
  transform: translateZ(0);
}
.btn-primary, .btn-secondary, .btn-signin, .btn-icon,
.usta-card, .master-card, .category-card, .footer-social-btn {
  will-change: transform;
  backface-visibility: hidden;
}
.page-header-bg { contain: strict; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } .reveal { opacity: 1; transform: none; } nav { backdrop-filter: none; background: var(--bg2); } }
@media (max-width: 640px) { .nav-links { display: none; } .hamburger { display: flex; } }

.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text3); margin-bottom: 24px; flex-wrap: wrap; }
.breadcrumb a { color: var(--text2); text-decoration: none; transition: color 0.2s; }
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .sep { font-size: 11px; }
.breadcrumb .current { color: var(--text); font-weight: 500; }
.usta-wrapper { padding-top: 64px; min-height: 100vh; position: relative; z-index: 1; }
.usta-inner { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }
.usta-header { display: flex; align-items: flex-start; gap: 24px; padding-bottom: 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; flex-wrap: wrap; }
.usta-avatar-lg { width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 36px; font-weight: 800; color: #fff; border: 3px solid var(--border); flex-shrink: 0; }
.usta-meta { flex: 1; }
.usta-name-row { font-family: var(--font-display); font-size: clamp(22px, 4vw, 30px); font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.usta-title-text { font-size: 14px; color: var(--accent2); font-weight: 600; margin-bottom: 4px; }
.usta-location { font-size: 13px; color: var(--text3); margin-bottom: 8px; }
.usta-desc-text { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; max-width: 500px; }
.usta-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 14px; }
.usta-stat { text-align: center; }
.usta-stat-num { font-family: var(--font-display); font-size: 20px; font-weight: 800; }
.usta-stat-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
.usta-tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.usta-tag { padding: 4px 12px; border-radius: 999px; background: var(--bg3); border: 1px solid var(--border); font-size: 12px; color: var(--text2); }
.usta-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-usta { padding: 10px 24px; background: var(--accent2); color: #000; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.2s; }
.btn-usta:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-usta-sec { padding: 10px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: border-color 0.2s, color 0.2s; display: flex; align-items: center; gap: 6px; }
.btn-usta-sec:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-usta-sec.following { border-color: var(--accent3); color: var(--accent3); }
.btn-usta-sec.following:hover { border-color: #ff5f5f; color: #ff5f5f; }

.section-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; margin-bottom: 20px; margin-top: 32px; }
.premium-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; background: color-mix(in srgb, var(--accent2) 15%, transparent); color: var(--accent2); border: 1px solid color-mix(in srgb, var(--accent2) 30%, transparent); }
.comment-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
.comment-item:last-child { border-bottom: none; }
.comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text2); }
.comment-user { font-size: 13px; font-weight: 600; }
.comment-stars { color: var(--accent2); font-size: 12px; }
.comment-date { font-size: 11px; color: var(--text3); margin-left: auto; }
.comment-text { font-size: 14px; color: var(--text2); line-height: 1.7; padding-left: 42px; }
@media (max-width: 640px) { .usta-header { flex-direction: column; align-items: flex-start; gap: 16px; } }

.modal-overlay-auth { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.modal-overlay-auth.open { opacity: 1; pointer-events: all; }
.auth-modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 420px; padding: 36px; position: relative; transform: translateY(20px) scale(0.97); transition: transform 0.3s; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
.modal-overlay-auth.open .auth-modal-box { transform: translateY(0) scale(1); }
.auth-modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 18px; display: flex; align-items: center; justify-content: center; }
.modal-logo { font-family: var(--font-display); font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.modal-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 8px; background: none; border: none; border-radius: 6px; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: color 0.2s, background 0.2s, box-shadow 0.2s; }
.auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.btn-google { width: 100%; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.2s; margin-bottom: 20px; }
.btn-google:hover { border-color: var(--accent); }
.google-icon { width: 18px; height: 18px; }
.divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 12px; color: var(--text3); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
.form-input::placeholder { color: var(--text3); }
.form-input:focus { border-color: var(--accent); }
.form-input.username-field { padding-left: 36px; }
.input-wrap { position: relative; }
.input-prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--accent); font-weight: 700; font-size: 15px; pointer-events: none; }
.btn-submit { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
.btn-submit:hover { background: #6a4de0; }
.auth-footer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text3); }
.auth-footer a { color: var(--accent); text-decoration: none; cursor: pointer; }
.auth-panel { display: none; }
.auth-panel.active { display: block; }
.profile-field { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg3); border-radius: var(--radius-sm); margin-bottom: 10px; }
.profile-field-label { font-size: 12px; color: var(--text2); width: 90px; }
.profile-field-val { font-size: 14px; color: var(--text); flex: 1; }



/* ── USTA KARTLARI ── */
.usta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.usta-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; display: block; position: relative; }
.usta-card:hover { transform: translateY(-3px); border-color: var(--accent2); box-shadow: 0 8px 32px rgba(240,197,92,0.15); }
.usta-card-premium { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; background: color-mix(in srgb, var(--accent2) 15%, transparent); color: var(--accent2); border: 1px solid color-mix(in srgb, var(--accent2) 30%, transparent); }
.usta-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.usta-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0; }
.usta-card-info { flex: 1; }
.usta-card-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.usta-card-title { font-size: 12px; color: var(--accent2); font-weight: 600; }
.usta-card-location { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
.usta-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.usta-tag { padding: 3px 10px; border-radius: 999px; background: var(--bg3); border: 1px solid var(--border); font-size: 11px; color: var(--text2); }
.usta-card-footer { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text2); }
.usta-card-rating { color: var(--accent2); }
.usta-card-stat { display: flex; align-items: center; gap: 4px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 14px; }
.toolbar-count { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.toolbar-count strong { color: var(--text); font-weight: 700; }
.cat-header { text-align: center; padding: 40px 0 32px; }
.cat-header-icon { font-size: 56px; margin-bottom: 12px; }
.cat-header-title { font-family: var(--font-display); font-size: clamp(26px, 4vw, 38px); font-weight: 800; margin-bottom: 8px; }
.cat-header-title .grad { background: linear-gradient(135deg, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.cat-header-sub { font-size: 14px; color: var(--text2); }
.cat-sub-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 14px; }
.cat-sub-tag { padding: 5px 14px; border-radius: 999px; background: var(--bg2); border: 1px solid var(--border); font-size: 12px; color: var(--text2); }
@media (max-width: 640px) { .usta-grid { grid-template-columns: 1fr; } }

</style>

<script>
/* ── MAGAZA-DATA (inline) ── */
/* ══════════════════════════════════════════════════════════
   GEN-Z MAĞAZA — Paylaşılan Veri & Yardımcılar
   ══════════════════════════════════════════════════════════ */

/* ── ROZET SİSTEMİ ── */
function getBadgeLevel(sales) {
  if (sales >= 100000) return { level: '100000', label: '🏅 Efsane', emoji: '🔴' };
  if (sales >= 10000)  return { level: '10000',  label: '🏅 Usta',   emoji: '🟣' };
  if (sales >= 1000)   return { level: '1000',   label: '🏅 Uzman',  emoji: '🟤' };
  if (sales >= 100)    return { level: '100',    label: '🏅 Deneyimli', emoji: '🟠' };
  if (sales >= 50)     return { level: '50',     label: '🏅 Gelişen', emoji: '🔵' };
  if (sales >= 10)     return { level: '10',     label: '🏅 Aktif',  emoji: '🟡' };
  if (sales >= 1)      return { level: '1',      label: '🏅 Yeni',   emoji: '🟢' };
  return { level: '0', label: '🏅 Başlangıç', emoji: '⚪' };
}

/* ── KATEGORİLER (ileride doldurulacak) ── */

/* ── YARDIMCI FONKSİYONLAR ── */
function getProductById(id) {
  return DEMO_PRODUCTS.find(p => p.id === parseInt(id));
}

function getProductsBySeller(sellerId) {
  return DEMO_PRODUCTS.filter(p => p.seller.id === sellerId);
}

function getSellerById(sellerId) {
  const product = DEMO_PRODUCTS.find(p => p.seller.id === sellerId);
  return product ? product.seller : null;
}

function getAllSellers() {
  const map = {};
  DEMO_PRODUCTS.forEach(p => {
    if (!map[p.seller.id]) {
      map[p.seller.id] = { ...p.seller, products: [] };
    }
    map[p.seller.id].products.push(p);
  });
  return Object.values(map);
}

function getProductsByCategory(catId) {
  if (catId === 'all') return DEMO_PRODUCTS;
  return DEMO_PRODUCTS.filter(p => p.category === catId);
}

/* ── URL YARDIMCILARI ── */
function getParam(key) {
  return new URLSearchParams(window.location.search).get(key);
}

function navigateTo(url) {
  document.body.style.transition = 'opacity 0.25s';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = url; }, 250);
}

/* ── ORTAK TOAST ── */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── ORTAK THEME / LANG ── */
/* ── SAFE STORAGE ── */
const _ls = {
  get(k, fb = null) { try { const v = localStorage.getItem(k); return v !== null ? v : fb; } catch(e) { return fb; } },
  set(k, v)         { try { localStorage.setItem(k, v); } catch(e) {} },
  remove(k)         { try { localStorage.removeItem(k); } catch(e) {} },
  getJSON(k, fb)    { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch(e) { return fb; } },
};
let currentLang  = _ls.get('genz-lang', 'tr');
let currentTheme = _ls.get('genz-theme', 'dark');
let currentUser  = _ls.getJSON('genz-user', null);

function initThemeLang() {
  document.documentElement.setAttribute('data-lang',  currentLang);
  document.documentElement.setAttribute('data-theme', currentTheme);
  const themeBtn = document.getElementById('themeBtn');
  if (themeBtn) themeBtn.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  if (currentUser) {
    const authBtn = document.getElementById('authBtn');
    if (authBtn) authBtn.textContent = currentUser.username;
    const pu = document.getElementById('profile-username');
    const pe = document.getElementById('profile-email');
    if (pu) pu.textContent = currentUser.username;
    if (pe) pe.textContent = currentUser.email;
  }
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  _ls.set('genz-theme', currentTheme);
  document.body.classList.add('theme-transitioning');
  document.documentElement.setAttribute('data-theme', currentTheme);
  const themeBtn = document.getElementById('themeBtn');
  if (themeBtn) themeBtn.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  showToast(currentTheme === 'dark' ? 'Koyu tema 🌙' : 'Açık tema ☀️');
  setTimeout(() => document.body.classList.remove('theme-transitioning'), 350);
}

function toggleLang() {
  currentLang = currentLang === 'tr' ? 'en' : 'tr';
  _ls.set('genz-lang', currentLang);
  document.documentElement.setAttribute('data-lang', currentLang);
  document.querySelectorAll('[data-tr]').forEach(el => {
    el.textContent = el.getAttribute('data-' + currentLang);
  });
  if (currentUser) {
    const authBtn = document.getElementById('authBtn');
    if (authBtn) authBtn.textContent = currentUser.username;
  }
  showToast(currentLang === 'tr' ? 'Dil: Türkçe 🇹🇷' : 'Language: English 🇬🇧');
}

function toggleMobileMenu() {
  const mm = document.getElementById('mobileMenu');
  const hb = document.getElementById('hamburgerBtn');
  if (mm) mm.classList.toggle('open');
  if (hb) hb.classList.toggle('open');
}

/* ── ORTAK AUTH MODAL ── */
function openAuth(tab) {
  if (currentUser) { switchTab('profile'); }
  else { switchTab(tab || 'signin'); }
  document.getElementById('authModal').classList.add('open');
}
function closeAuth() { document.getElementById('authModal').classList.remove('open'); }
function closeAuthIfOutside(e) { if (e.target === document.getElementById('authModal')) closeAuth(); }
function switchTab(tab) {
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('panel-' + tab);
  if (panel) panel.classList.add('active');
  const tabBtn = document.getElementById('tab-' + tab);
  if (tabBtn) tabBtn.classList.add('active');
  const authTabs = document.getElementById('authTabs');
  if (authTabs) authTabs.style.display = (tab === 'forgot' || tab === 'profile') ? 'none' : 'flex';
}
function doSignIn() {
  const email = document.getElementById('signin-email').value.trim();
  const pass  = document.getElementById('signin-pass').value;
  if (!email || !pass) { showToast('Lütfen tüm alanları doldurun ⚠️'); return; }
  fakeLogin(email, 'Kullanıcı');
}
function doSignUp() {
  const username = document.getElementById('signup-username').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const pass     = document.getElementById('signup-pass').value;
  if (!username || !email || !pass) { showToast('Lütfen tüm alanları doldurun ⚠️'); return; }
  if (pass.length < 8) { showToast('Şifre en az 8 karakter olmalı ⚠️'); return; }
  fakeLogin(email, username);
}
function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showToast('E-posta adresinizi girin ⚠️'); return; }
  showToast('Sıfırlama bağlantısı gönderildi ✉️');
  setTimeout(() => switchTab('signin'), 1500);
}
// googleSignIn -> firebase-auth.js
function fakeLogin(email, username) {
  const clean = '@' + username.replace('@', '');
  currentUser = { email, username: clean };
  _ls.set('genz-user', JSON.stringify(currentUser));
  const pe = document.getElementById('profile-email');
  const pu = document.getElementById('profile-username');
  const ab = document.getElementById('authBtn');
  if (pe) pe.textContent = email;
  if (pu) pu.textContent = clean;
  if (ab) ab.textContent = clean;
  closeAuth();
  showToast('Hoş geldin, ' + clean + ' 👋');
}
function doSignOut() {
  currentUser = null;
  _ls.remove('genz-user');
  const ab = document.getElementById('authBtn');
  if (ab) ab.textContent = currentLang === 'tr' ? 'Giriş Yap' : 'Sign In';
  closeAuth();
  showToast('Çıkış yapıldı 👋');
}
function goToProfile() {
  if (currentUser) {
    closeAuth();
    navigateTo('profile.html');
  }
}

/* ── DEBOUNCE ── */
function debounce(fn, delay) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

/* ── YILDIZ RENDER ── */
function renderStars(rating) {
  return '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
}

function getUstaById(id) { return DEMO_USTALAR.find(u => u.id === id); }
function getUstalarByCategory(catId) { return catId === 'all' ? DEMO_USTALAR : DEMO_USTALAR.filter(u => u.category === catId); }
function renderStars(r) { return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r)); }




/* ── PAGE SCRIPT ── */
initThemeLang();
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.mobile-menu a').forEach(a => { a.addEventListener('click', () => { document.getElementById('mobileMenu')?.classList.remove('open'); document.getElementById('hamburgerBtn')?.classList.remove('open'); }); });
  document.body.style.opacity='0'; document.body.style.transition='opacity 0.3s';
  requestAnimationFrame(() => { document.body.style.opacity='1'; });

  const catId = new URLSearchParams(window.location.search).get('cat') || 'all';
  const cat = USTAM_CATEGORIES.find(c => c.id === catId);
  
  if (!cat) {
    document.querySelector('.usta-inner').innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-text">Kategori bulunamadı</div><div class="empty-sub"><a href="ustam.html" style="color:var(--accent)">← Ustalara dön</a></div></div>';
    return;
  }

  document.title = 'GEN-Z · ' + cat.name + ' Ustaları';
  document.getElementById('breadcrumb').innerHTML = '<a href="ustam.html">Ustam</a><span class="sep">›</span><span class="current">' + cat.name + '</span>';
  
  document.getElementById('catHeader').innerHTML = 
    '<div class="cat-header-icon">' + cat.icon + '</div>' +
    '<div class="cat-header-title"><span class="grad">' + cat.name + '</span> Ustaları</div>' +
    '<div class="cat-header-sub">' + cat.name + ' alanında hizmet veren güvenilir ustalar</div>' +
    (cat.subs ? '<div class="cat-sub-tags">' + cat.subs.map(s => '<span class="cat-sub-tag">' + s + '</span>').join('') + '</div>' : '');

  const ustalar = getUstalarByCategory(catId);
  document.getElementById('ustaCount').textContent = ustalar.length;
  const grid = document.getElementById('ustaGrid');

  if (ustalar.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Bu kategoride henüz usta yok</div><div class="empty-sub">Yakında eklenecek!</div></div>';
    return;
  }

  const fragment = document.createDocumentFragment();
  ustalar.forEach(u => {
    const card = document.createElement('a');
    card.className = 'usta-card';
    card.href = 'ustam-profil.html?usta=' + u.id;
    card.innerHTML = (u.badge === 'premium' ? '<div class="usta-card-premium">✦ Premium</div>' : '') +
      '<div class="usta-card-top"><div class="usta-avatar">' + u.initials + '</div><div class="usta-card-info"><div class="usta-card-name">' + u.name + '</div><div class="usta-card-title">' + u.title + '</div></div></div>' +
      '<div class="usta-card-location">📍 ' + u.district + ' / ' + u.city + '</div>' +
      '<div class="usta-card-tags">' + u.tags.slice(0,3).map(t => '<span class="usta-tag">' + t + '</span>').join('') + '</div>' +
      '<div class="usta-card-footer"><span class="usta-card-rating">' + renderStars(u.rating) + ' ' + u.rating + '</span><span class="usta-card-stat">📋 ' + u.jobCount + ' iş</span><span class="usta-card-stat">💬 ' + u.reviewCount + '</span></div>';
    fragment.appendChild(card);
  });
  grid.appendChild(fragment);
});
</script>
